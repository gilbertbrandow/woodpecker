services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/woodpecker-backend:${IMAGE_TAG:-latest}
    build:
      target: prod
    command: ["bash", "-lc", "gunicorn -b 0.0.0.0:8000 'app:create_app()' --workers 1 --threads 4 --timeout 60"]
    expose:
      - "8000"
    environment:
      FLASK_ENV: production
      SESSION_COOKIE_SECURE: "1"
      APP_ORIGIN: ${APP_ORIGIN:?set APP_ORIGIN}

  frontend:
    image: ghcr.io/${GHCR_OWNER}/woodpecker-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      target: prod
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/woodpecker/deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
