name: ci

on:
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: lint
        working-directory: backend
        run: make lint

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: woodpecker
          POSTGRES_PASSWORD: woodpecker
          POSTGRES_DB: woodpecker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Check Alembic migrations
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret
          DATABASE_URL: postgresql://woodpecker:woodpecker@localhost:5432/woodpecker_test
        run: .venv/bin/flask --app app db upgrade

      - name: test
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret
          DATABASE_URL: postgresql://woodpecker:woodpecker@localhost:5432/woodpecker_test
        run: make test-integration

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: lint
        working-directory: frontend
        run: make lint

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: test
        working-directory: frontend
        run: make test

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: docker build --target prod backend/

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Node version consistency
        run: bash frontend/scripts/check-node-version.sh

      - name: Build
        run: docker build --target build frontend/

  build-pipeline:
    name: Build pipeline images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build base image
        run: docker build -f pipeline/base.Dockerfile -t woodpecker-pipeline-base .

      - name: Build shared image
        run: docker build -f pipeline/shared/Dockerfile -t woodpecker-pipeline-shared .

      - name: Build lichess-tactics image
        run: docker build -f pipeline/sources/lichess_tactics/Dockerfile -t woodpecker-pipeline-lichess-tactics .
