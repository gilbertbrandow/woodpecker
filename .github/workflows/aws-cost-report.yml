name: AWS Cost Report

on:
  schedule:
    - cron: "0 6 3 * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  cost-report:
    name: Update AWS cost table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_COST_REPORTER_ROLE_ARN }}
          aws-region: us-east-1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install boto3
        run: pip install boto3

      - name: Run cost report
        run: python deploy/scripts/aws-cost-report.py deploy/README.md

      - name: Open PR if README changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add AWS cost rows"
          branch: chore/aws-cost-update
          delete-branch: true
          title: "chore: add missing AWS cost rows"
          body: |
            Automated monthly AWS cost update generated by the `aws-cost-report` workflow.

            **Before merging:**
            - [ ] Review the numbers look plausible
            - [ ] Fill in the **SEK paid** column manually (card charge for the month)
            - [ ] Add any **Notes** worth keeping (e.g. one-off costs, unexpected spikes)
          labels: devops
