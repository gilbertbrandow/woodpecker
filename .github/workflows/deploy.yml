name: deploy

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "value=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: backend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/woodpecker-backend:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/woodpecker-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/woodpecker-frontend:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/woodpecker-frontend:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,docker-compose-prod.yml,docker-compose-db-tunnel.yml"
          target: /opt/woodpecker

      - name: Copy scripts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/scripts/backup-db.sh,deploy/scripts/woodpecker-backup.service,deploy/scripts/woodpecker-backup.timer"
          target: /opt/woodpecker/scripts/
          strip_components: 2

      - name: Pull, restart, migrate
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,IMAGE_TAG,BACKUP_BUCKET
          script: |
            set -e

            # Inject BACKUP_BUCKET into .env (idempotent)
            if grep -qxF "BACKUP_BUCKET=${BACKUP_BUCKET}" /opt/woodpecker/.env 2>/dev/null; then
              echo "BACKUP_BUCKET already set correctly"
            else
              sed -i '/^BACKUP_BUCKET=/d' /opt/woodpecker/.env
              echo "BACKUP_BUCKET=${BACKUP_BUCKET}" >> /opt/woodpecker/.env
            fi

            # Install AWS CLI if not present (idempotent)
            if ! command -v aws &>/dev/null; then
              echo "Installing AWS CLI..."
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
              unzip -q /tmp/awscliv2.zip -d /tmp/
              sudo /tmp/aws/install
              rm -rf /tmp/awscliv2.zip /tmp/aws
            fi

            # Install / refresh systemd backup units
            chmod +x /opt/woodpecker/scripts/backup-db.sh
            sudo cp /opt/woodpecker/scripts/woodpecker-backup.service /etc/systemd/system/
            sudo cp /opt/woodpecker/scripts/woodpecker-backup.timer   /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable --now woodpecker-backup.timer

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            cd /opt/woodpecker
            docker compose -f docker-compose.yml -f docker-compose-prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose-prod.yml restart nginx
            echo "Waiting for backend..."
            for i in $(seq 1 30); do
              docker compose -f docker-compose.yml -f docker-compose-prod.yml exec -T backend true 2>/dev/null && break
              sleep 2
            done
            docker compose -f docker-compose.yml -f docker-compose-prod.yml exec -T backend flask --app app db upgrade
