name: deploy

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "value=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: backend
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/woodpecker-backend:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/woodpecker-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          target: prod
          push: true
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/woodpecker-frontend:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/woodpecker-frontend:latest

      - name: Build and push backup
        uses: docker/build-push-action@v7
        with:
          context: deploy/backup
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/woodpecker-backup:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/woodpecker-backup:latest

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://woodpeckerchess.com
    steps:
      - uses: actions/checkout@v6

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,docker-compose-prod.yml,docker-compose-db-tunnel.yml"
          target: /opt/woodpecker

      - name: Copy scripts to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/scripts/woodpecker-backup.service,deploy/scripts/woodpecker-backup.timer"
          target: /opt/woodpecker/scripts/
          strip_components: 2

      - name: Pull, restart, migrate
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          LICHESS_CLIENT_ID: ${{ secrets.LICHESS_CLIENT_ID }}
          LICHESS_REDIRECT_URI: ${{ secrets.LICHESS_REDIRECT_URI }}
          APP_ORIGIN: ${{ secrets.APP_ORIGIN }}
          SESSION_COOKIE_SECURE: ${{ secrets.SESSION_COOKIE_SECURE }}
          MAX_USERS: ${{ secrets.MAX_USERS }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,GHCR_OWNER,IMAGE_TAG,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,SECRET_KEY,LICHESS_CLIENT_ID,LICHESS_REDIRECT_URI,APP_ORIGIN,SESSION_COOKIE_SECURE,MAX_USERS,SENTRY_DSN,BACKUP_BUCKET
          script: |
            set -e

            # Write full .env from GitHub environment secrets (authoritative on every deploy)
            cat > /opt/woodpecker/.env.new << EOF
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            SECRET_KEY=${SECRET_KEY}
            LICHESS_CLIENT_ID=${LICHESS_CLIENT_ID}
            LICHESS_REDIRECT_URI=${LICHESS_REDIRECT_URI}
            APP_ORIGIN=${APP_ORIGIN}
            SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE}
            MAX_USERS=${MAX_USERS}
            SENTRY_DSN=${SENTRY_DSN}
            BACKUP_BUCKET=${BACKUP_BUCKET}
            GHCR_OWNER=${GHCR_OWNER}
            EOF
            chmod 600 /opt/woodpecker/.env.new
            mv /opt/woodpecker/.env.new /opt/woodpecker/.env

            # Install AWS CLI if not present — needed for operator restore commands on the EC2 host
            if ! command -v aws &>/dev/null; then
              echo "Installing AWS CLI..."
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
              unzip -q /tmp/awscliv2.zip -d /tmp/
              sudo /tmp/aws/install
              rm -rf /tmp/awscliv2.zip /tmp/aws
            fi

            # Install / refresh systemd backup units
            sudo cp /opt/woodpecker/scripts/woodpecker-backup.service /etc/systemd/system/
            sudo cp /opt/woodpecker/scripts/woodpecker-backup.timer   /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable --now woodpecker-backup.timer

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            cd /opt/woodpecker
            docker compose -f docker-compose.yml -f docker-compose-prod.yml pull
            docker pull ghcr.io/${GHCR_OWNER}/woodpecker-backup:${IMAGE_TAG}
            docker compose -f docker-compose.yml -f docker-compose-prod.yml up -d --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose-prod.yml restart nginx
            echo "Waiting for backend..."
            for i in $(seq 1 30); do
              docker compose -f docker-compose.yml -f docker-compose-prod.yml exec -T backend true 2>/dev/null && break
              sleep 2
            done
            docker compose -f docker-compose.yml -f docker-compose-prod.yml exec -T backend flask --app app db upgrade
