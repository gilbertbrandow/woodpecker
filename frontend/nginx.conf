server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location /assets/ {
    add_header Cache-Control "max-age=31536000, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
