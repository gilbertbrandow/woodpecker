services:
  backend:
    command: ["bash", "-lc", "flask --app app run --host=0.0.0.0 --port=8000 --debug"]
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: development
      APP_ORIGIN: "http://localhost:5173"
      SESSION_COOKIE_SECURE: "0"

  frontend:
    build:
      context: ./frontend
      target: dev
    command: ["bash", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - backend