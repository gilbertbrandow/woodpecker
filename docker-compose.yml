services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-woodpecker}
      POSTGRES_USER: ${POSTGRES_USER:-woodpecker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woodpecker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-woodpecker} -d ${POSTGRES_DB:-woodpecker}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-woodpecker}:${POSTGRES_PASSWORD:-woodpecker}@db:5432/${POSTGRES_DB:-woodpecker}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      LICHESS_CLIENT_ID: ${LICHESS_CLIENT_ID:?set LICHESS_CLIENT_ID}
      LICHESS_REDIRECT_URI: ${LICHESS_REDIRECT_URI:?set LICHESS_REDIRECT_URI}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:5173}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-0}
      FLASK_ENV: ${FLASK_ENV:-production}
      MAX_USERS: ${MAX_USERS:-0}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
